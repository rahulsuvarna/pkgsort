name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# NODE_OPTIONS=--throw-deprecation is set per `run:` step below rather than
# globally: a workflow- or job-level `env` also applies to third-party `uses:`
# actions (e.g. actions/setup-node), whose own deprecation warnings (such as
# punycode) would then become fatal. Scoping it to our own steps keeps
# deprecations failing for our code without breaking setup actions.

jobs:
  # Fast-failing quality gates run once on the LTS baseline.
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run typecheck
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run lint
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run format:check
        env:
          NODE_OPTIONS: --throw-deprecation

  # The real correctness signal: full suite across supported Node & OS.
  # Minimum supported runtime is Node 22 LTS; 24 tracks current.
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run build
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run test:coverage
        env:
          NODE_OPTIONS: --throw-deprecation
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # Guard against accidental breakage of the published artifact.
  package:
    name: Verify package contents
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm run build
        env:
          NODE_OPTIONS: --throw-deprecation
      - run: npm pack --dry-run
        env:
          NODE_OPTIONS: --throw-deprecation
